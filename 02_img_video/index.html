<!DOCTYPE html>
<!-- Declara el tipo de documento, Indica al navegador que usará HTML5-->
<html lang="es">
<!-- Elemento principal del documento HTML. Lang="es" indica el contenido que esta en "español"-->

<head><!--Sección de configuración del documento-->
<meta charset="UTF-8">
<!-- Define la codificación de caracteres.
UTF-8 permite usar correctamente tildes, ñ, símbolos, etc -->
<meta name="viewport" content= "width=device-width, initial-scale=1.0">
<!-- Hace que el sitio se responsive.
Permite que el diseño se adapte correctamente a celulares y tablets-->
<title> Practicando HTML - img y videos</title>
<!-- Titulo que aparece en el navegador-->
<meta name="author" content="Gabriel Naranjo">
<!-- Indica quién creo el sitio web-->

<link rel="stylesheet" href="static/css/style.css">
<!--Conexión con hoja CSS de estilos-->
</head>
<body>
<header> <!-- Encabezado del documento -->
<h1>Sitio nultimedia personal</h1>
</header>
<hr><!-- Crea una línea de división-->
<main><!-- Sección principal del documento-->
<h2> Mis datos:</h2>
<p> Nombre: Gabriel Naranjo<br> <!-- br es un salto de línea-->
    Curso: 3°C
</p>
</hr>
<h2> Galería multimedia</h2>
<p> Imagen de ejemplo</p>
<img src="static/images/imagen1.png" alt="primera imagen" width="200">
<img src="static/images/imagen2.png" alt="primera imagen" width="200">
<img src="static/images/imagen3.png" alt="primera imagen" width="200">
<img src="static/images/Imagen4.png" alt="primera imagen" width="200">
<hr>
<h2>Videos</h2>
<video width="600" controls>
<source src="static/videos/Video1.mp4" type="video/mp4">
</video>
<video width="600" controls>
<source src="static/videos/Video2.mp4" type="video/mp4">
</video> 
</main>
<footer>
<p style="text-align:center"> Todos los derechos reservados 
-<a href="https://kimetsu-no-yaiba.fandom.com/es/wiki/Kimetsu_no_Yaiba_Wiki">Más información</a> <!-- etiqueta <a> para vinculos -->
</p>

</footer>
</body>
</html>
